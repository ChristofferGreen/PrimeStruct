<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PrimeStruct Spinning Cube</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #d9f0ff 0%, #7b9cc3 45%, #22324a 100%);
      }

      main {
        width: min(92vw, 960px);
        display: grid;
        gap: 0.8rem;
      }

      h1 {
        margin: 0;
        color: #f4f8ff;
        font-size: clamp(1.1rem, 2vw, 1.5rem);
        letter-spacing: 0.04em;
      }

      canvas {
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 12px;
        background: linear-gradient(180deg, #0f1a2a 0%, #060b14 100%);
        box-shadow: 0 24px 50px rgba(0, 0, 0, 0.35);
      }

      #status {
        margin: 0;
        color: #d6e4ff;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PrimeStruct Spinning Cube Host (Browser)</h1>
      <canvas id="cube-canvas" width="960" height="540"></canvas>
      <p id="status">Loading host assets...</p>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
